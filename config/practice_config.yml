# Dr Chalita le Roux Inc — Practice Configuration
#
# SINGLE SOURCE OF TRUTH for every value the AI receptionist quotes, every
# wording it uses verbatim, and every policy parameter it follows. The
# AI loads this file via PracticeConfig at boot and serves it for the life
# of the process; restart Rails (or wait for cache TTL) after edits.
#
# Edit this file via Claude Code review → pull request → merge.
# Do NOT add scattered constants elsewhere in the codebase. If a value
# belongs to the practice rather than the platform, it lives here.
#
# Code-locked behavioural guardrails (e.g. no-past-booking, idempotency,
# false-confirmation rewrite) stay in code — see CODE_LOCKED_GUARDRAILS.md
# in the project root. This file is for facts, prices, hours, services,
# wording, and policy parameters that may change with practice operations.
#
# Version history kept in git. Last full review: 2026-05-06 (v2.2).

