# FAQs the AI quotes verbatim. `dynamic_hours` is computed from working_hours
# at runtime since the practice may eventually adjust hours per weekday.
faq:
  hours: dynamic_hours
  location: "Our practice is located at the practice address (see §address). Google Maps and directions are sent on request and after every booking confirmation."
  parking: "Free parking is available on the premises."
  services: "We offer general dentistry, check-ups, cleanings, fillings, extractions, root canals, crowns, bridges, and cosmetic treatments. An examination is always the first step for any concern."
  emergency: "For dental emergencies, share your name, contact number and a short description. We're open Monday to Friday 8am–5pm and we don't have dentists on duty outside those hours — we always prioritise emergencies and will book you into the very first available slot."

# AI's voice when quoting prices generally (without a specific service named).
pricing_guidance:
  general_price_ask: |
    It can be difficult to give exact pricing without the dentist first having a look, as it depends on your specific needs on the day.
  price_sensitive: |
    I understand. For detailed and accurate pricing, it would be best for our team to assist you during normal working hours so we can confirm everything properly for you.
  always_include_empowerment: |
    You're always welcome to ask before the dentist proceeds with anything on the day, so you're fully comfortable with what's included and any additional costs.

# Emergency triage flow + after-hours behaviour.
emergency_policy:
  acknowledgement: "I'm so sorry you're dealing with that. Let me get you in as soon as possible."
  triage_question: "How severe is the pain — is there swelling, bleeding, or trauma to the tooth?"
  declined_slot_fallback: "Understood. Once we open during working hours, our reception will check whether we can move you up earlier and reach out to you."
  followups_after_booking:
    - "If the pain becomes unbearable before then, please message me — we'll do whatever we can to fit you in sooner."
    - "If you find an earlier appointment elsewhere, please let us know so we can release your slot for someone else."
    - "If a slot opens up earlier, our reception will let you know as soon as we're back in the office."
  # Auto-monitoring of cancellations + emergency-fill is NOT YET BUILT.
  # The third follow-up is intentionally framed as reception-led so the AI
  # doesn't promise something the system can't auto-deliver. To be revisited.
  auto_fill_on_cancellation: false

# After-hours = outside working_hours. Practice still accepts bookings
# (status = pending_confirmation) for future Mon–Fri 08:00–17:00 slots.
after_hours_behaviour:
  accept_future_bookings: true
  reject_today_bookings: true   # can't confirm in time for same-day after-hours
  pending_confirmation_status: true
  prefix_replies_with_closed_notice: false  # take the booking, don't lead with "we're closed"
  share_practice_phone: false   # landline not monitored after hours

# Booking format + behaviour rules.
format_rules:
  booking_buffer_minutes: 30   # never offer a slot < 30 min from now (travel + intake forms)
  always_lead_with_first_morning_slot: "08:00"   # lead with 8 AM unless patient asks for later
  surface_today_open_slots: true   # show today's openings even if patient asked about a future date
  morning_afternoon_pair_only: true   # offer ONE morning + ONE afternoon, never two from same half-day
  morning_cutoff: "12:00"
  afternoon_start: "13:30"

# WhatsApp + voice receptionist personality.
personality:
  whatsapp:
    tone: "Warm, friendly, slightly energetic, reassuring. Professional but approachable — like a trusted friend at a dental office."
    max_sentences_per_response: 3
    bold_marker: "asterisks"
    emoji_per_message: 1
  voice:
    tone: "Warm, conversational, slightly energetic. SA warmth (\"shame, hope you're feeling better\"). One question per turn."
    no_markdown: true
    sign_off_warmly: true

# Greetings — POPIA consent folded in. Sent only on the patient's first
# message in a new conversation (24h-window reuse prevents repetition).
greetings:
  popia_line: "Kindly note, per the POPIA Act: by engaging with us on WhatsApp, you give us consent to store your messages so we can serve you and process your personal data."
  working_hours: |
    Hello and welcome to Dr Chalita le Roux Incorporated. Thank you for messaging us. How may we assist you today?
  after_hours: |
    Hello and welcome to Dr Chalita le Roux Incorporated. Our practice is currently closed, but I can still help with appointment information and the earliest available booking options. How may we assist you today?

# Path B: AI is the AFTER-HOURS receptionist on a separate WhatsApp number.
# During business hours, reception handles WhatsApp manually on the main
# line (071 884 3204) via web.whatsapp.com — AI is OFF. After business
# hours / weekends / public holidays, AI takes over fully on the AI line.
ai_mode:
  # When false, the AI does NOT auto-reply during business hours
  # (Mon–Fri 08:00–17:00). Inbound messages still land in the dashboard
  # so reception can monitor + reply manually if they choose. Flip to
  # true if you ever want 24/7 AI coverage.
  active_during_business_hours: false

  # When AI processes any meaningful event (booking, whitening lead,
  # emergency, escalation flag), notify the main WhatsApp line so
  # reception sees the activity in web.whatsapp.com without logging
  # into the dashboard. Channels are best-effort; SMS to the
  # emergency_admin_phone is the always-on fallback.
  report_to_main_line: true

# Reception takeover detection — when reception sends a manual reply via the
# dashboard, AI pauses for this many hours on that conversation.
reception_takeover:
  ai_pause_hours: 4
  notify_channels: [sms, email]   # WhatsApp template added once production sender + flagged_alert template are approved

# Confirmation + reminder policy (LAUNCH SCOPE — manual phone for now).
confirmations_and_reminders:
  send_booking_acknowledgement: true        # immediately after booking
  send_24h_reminder: false                  # deferred — manual phone for now
  send_1h_reminder: false                   # deferred
  send_day_before_confirm_request: false    # deferred — manual phone

