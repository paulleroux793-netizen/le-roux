# Services with duration, pricing, and any policy notes.
# The `key` field is the canonical identifier used in code (treatment matching,
# appointment duration lookup, etc.).
services:
  - key: consultation
    name: "Specific consultation"
    duration_minutes: 30
    approx_price: "R850"
    includes_xrays: true
    excludes_3d_scans: true
    use_case: "Patient wants the doctor to look at something specific or advise on a particular concern."
    quote_template: |
      A consultation with Dr Chalita is approximately R850 and includes X-rays. Please note that 2D or 3D scans (panoramic / CBCT) are not included and would be quoted separately — these may be needed if you have implants, root canals, or where the doctor needs more detail to advise you properly. If cost is a concern for you, you're always welcome to ask about the cost of any additional scans before they're taken — we want you to feel completely comfortable with what's included.

  - key: check_up
    name: "General check-up"
    duration_minutes: 45
    approx_price: "R1,900"
    approx_price_with_3d_scan: "up to R2,600"
    includes_xrays: true
    excludes_3d_scans: true
    use_case: "Routine examination."
    quote_template: |
      A general check-up with Dr Chalita is approximately R1,900 and includes X-rays. If you have implants, root canals, or the doctor decides a 3D scan would help her advise you properly, the cost can go up to around R2,600. If cost is a concern, you're always welcome to ask about the cost of any additional scans before they're taken.

  - key: cleaning
    name: "Dental cleaning (oral hygiene)"
    duration_minutes: 30
    approx_price: "R1,250 – R1,350"
    use_case: "Standard hygienist cleaning appointment."
    quote_template: |
      A dental cleaning with us is approximately R1,250 to R1,350.

  - key: cosmetic_consultation
    name: "Cosmetic consultation"
    duration_minutes: 45
    approx_price: "R1,900"
    approx_price_with_3d_scan: "up to R2,600"
    use_case: "Patient enquiring about veneers, smile makeover, or other cosmetic work."
    quote_template: |
      A cosmetic consultation is approximately R1,900 and includes X-rays. If you have implants, root canals, or the doctor decides a 3D scan would help her advise you properly, the cost can go up to around R2,600. If cost is a concern, you're always welcome to ask about the cost of any additional scans before they're taken.

  - key: filling
    name: "Filling / restorative / resin bonding / resin veneers"
    duration_minutes: 30
    approx_price: null  # quote depends on size & type
    requires_examination_first: true
    quote_template: |
      The cost of a filling, resin bonding or resin veneer depends on the size and type of work needed. We'd start with an examination so the dentist can assess the area and advise on the most suitable treatment and cost.

  - key: extraction
    name: "Extraction (simple OR surgical)"
    duration_minutes: 30
    approx_price: "from R1,500"
    requires_consultation_first: true
    quote_template: |
      Extractions normally start from approximately R1,500, but the price varies depending on whether it's a child or adult, the specific tooth, and whether it's a simple or surgical extraction. The best step is to come for a consultation with Dr Chalita first — she can assess the tooth, distinguish what type of extraction is needed, and walk you through the cost and treatment plan before anything is done.

  - key: aligner_consultation
    name: "Aligner consultation + assessment (NOT braces)"
    duration_minutes: 45
    approx_price: "R5,000"
    use_case: "Patient asking about braces or aligners. The practice does not offer traditional braces."
    quote_template: |
      We don't offer traditional braces, but we do aligners — which work like invisible braces. The whole consultation and assessment package for aligners is approximately R5,000, and Dr Chalita can walk you through the treatment plan and costs based on your specific needs.

  - key: whitening
    name: "Teeth whitening (Biolase laser)"
    duration_minutes: 90
    approx_price: "R7,800 total"
    deposit_required: "R2,000"
    deposit_balance: "R5,800"
    pending_until_proof_of_payment: true
    working_hours_only: true  # never after-hours
    aliases: [whitening, "teeth whitening", biolase, "laser whitening", bleach, bleaching, bleiking, tandebleiking]
    full_info_message:
      en: |
        *Biolase Laser Teeth Whitening* 🌿

        Our Biolase laser teeth whitening is a comfortable, in-chair procedure designed to safely brighten your smile while protecting your enamel and gums.

        *The appointment includes:*
        • A professional dental cleaning
        • Application of a medical-grade whitening gel
        • Activation with the Biolase laser for enhanced, even results

        The treatment takes approximately *90 minutes*, and most patients notice a visibly brighter smile immediately after the session.

        *Cost:* R7,800 for the full whitening treatment.

        *To secure your booking* we require a *R2,000 deposit* up front (we book 90 minutes of the diary for you). The remaining R5,800 is settled on the day.

        *Banking details:*
        Bank: Investec Bank Limited
        Branch: 100 Grayston Drive, Sandton
        Branch code: 58 01 05
        Account type: Current Account
        Account name: Dr Chalita Le Roux Inc
        Account number: 10013494325
        Company No: 2022/698149/21
        Reference: Your full name

        Once you've sent proof of payment, I'll secure your slot. Please share your preferred date and time (Monday to Friday, 8am–5pm) and I'll pencil you in while we wait for the deposit.

        Any questions — just ask! 😊
      af: |
        *Biolase Laser Tandebleiking* 🌿

        Ons Biolase laser tandebleiking is 'n gemaklike in-stoel prosedure wat jou glimlag veilig verhelder terwyl dit jou emalj en gom beskerm.

        *Die afspraak sluit in:*
        • 'n Professionele tand-skoonmaak
        • Aanbring van 'n mediese graad bleikgel
        • Aktivering met die Biolase laser vir beter, eweredige resultate

        Die behandeling neem ongeveer *90 minute*, en die meeste pasiënte sien 'n sigbaar helderder glimlag onmiddellik na die sessie.

        *Koste:* R7,800 vir die volle bleikingsbehandeling.

        *Om jou afspraak te bevestig* benodig ons 'n *R2,000 deposito* vooruit (ons bespreek 90 minute van die dagboek vir jou). Die oorblywende R5,800 is betaalbaar op die dag.

        *Bankbesonderhede:*
        Bank: Investec Bank Limited
        Tak: 100 Grayston Drive, Sandton
        Takkode: 58 01 05
        Rekeningtipe: Lopende Rekening
        Rekeningnaam: Dr Chalita Le Roux Inc
        Rekeningnommer: 10013494325
        Maatskappy No: 2022/698149/21
        Verwysing: Jou volle naam

        Sodra jy bewys van betaling gestuur het, sal ek jou gleuf vasmaak. Stuur asseblief jou voorkeurdatum en -tyd (Maandag tot Vrydag, 8vm–5nm) en ek sal dit vir jou reserveer terwyl ons wag vir die deposito.

        Enige vrae — laat weet gerus! 😊

